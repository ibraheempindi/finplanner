<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login - Budget Planner</title>
  <link rel="stylesheet" href="/styles.css">
  <style>
    .auth-container {
      max-width: 400px;
      margin: 50px auto;
      padding: 20px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fff;
    }
    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .auth-form input {
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
    }
    .auth-form button {
      padding: 10px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .auth-form button:hover {
      background: #0056b3;
    }
    .toggle-auth {
      text-align: center;
      margin-top: 15px;
    }
    .toggle-auth a {
      color: #007bff;
      text-decoration: none;
    }
    .error {
      color: red;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <h2 id="auth-title">Login</h2>
    <form id="auth-form" class="auth-form">
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit" id="auth-button">Login</button>
    </form>
    <div class="toggle-auth">
      <a href="#" id="toggle-link">Don't have an account? Register</a>
    </div>
    <div id="error-message" class="error" style="display:none;"></div>
  </div>

  <script>
    let isLogin = true;

    const authTitle = document.getElementById('auth-title');
    const authButton = document.getElementById('auth-button');
    const toggleLink = document.getElementById('toggle-link');
    const authForm = document.getElementById('auth-form');
    const errorMessage = document.getElementById('error-message');

    function toggleMode() {
      isLogin = !isLogin;
      authTitle.textContent = isLogin ? 'Login' : 'Register';
      authButton.textContent = isLogin ? 'Login' : 'Register';
      toggleLink.textContent = isLogin ? "Don't have an account? Register" : 'Already have an account? Login';
    }

    toggleLink.addEventListener('click', (e) => {
      e.preventDefault();
      toggleMode();
    });

    authForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const endpoint = isLogin ? '/auth/login' : '/auth/register';
        const response = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();
        if (response.ok) {
          localStorage.setItem('token', data.token);
          window.location.href = '/index.html';
        } else {
          errorMessage.textContent = data.error || 'An error occurred';
          errorMessage.style.display = 'block';
        }
      } catch (error) {
        errorMessage.textContent = 'Network error';
        errorMessage.style.display = 'block';
      }
    });
  </script>
</body>
</html>
